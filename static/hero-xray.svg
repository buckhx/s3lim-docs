<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow and Shadow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="dropshadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- X-Ray Gradient -->
    <linearGradient id="xrayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.3" />
    </linearGradient>
  </defs>

  <!-- Left: Standard Bucket -->
  <g transform="translate(100, 100)" filter="url(#dropshadow)">
    <!-- Main Body -->
    <path d="M20 40 C 20 10, 180 10, 180 40 L 190 220 C 190 250, 10 250, 10 220 Z" fill="#F1F5F9" stroke="#94A3B8" stroke-width="4"/>
    <ellipse cx="100" cy="40" rx="80" ry="25" fill="#F8FAFC" stroke="#94A3B8" stroke-width="4"/>
    <text x="100" y="280" text-anchor="middle" fill="#64748B" font-family="sans-serif" font-weight="900" font-size="18">Standard S3 Bucket</text>
    <text x="100" y="305" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-weight="bold" font-size="14">"100 TB of Data"</text>
  </g>

  <!-- Center: Action Arrow -->
  <path d="M330 200 H 370" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <text x="350" y="170" text-anchor="middle" fill="#2563EB" font-family="sans-serif" font-weight="900" font-size="12">s3lim X-RAY</text>

  <!-- Right: X-Ray Bucket -->
  <g transform="translate(500, 100)">
    <!-- The X-Ray Frame / Glow -->
    <rect x="-10" y="-10" width="220" height="340" rx="20" fill="#EFF6FF" opacity="0.5" stroke="#3B82F6" stroke-width="2" stroke-dasharray="10 5" />
    
    <!-- Transparent Body -->
    <path d="M20 40 C 20 10, 180 10, 180 40 L 190 220 C 190 250, 10 250, 10 220 Z" fill="url(#xrayGrad)" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.5"/>
    <ellipse cx="100" cy="40" rx="80" ry="25" fill="white" fill-opacity="0.5" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.5"/>

    <!-- INTERNAL WASTE: Duplicates -->
    <g transform="translate(40, 80)">
      <rect width="120" height="30" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" />
      <text x="10" y="20" fill="#B91C1C" font-family="sans-serif" font-weight="bold" font-size="10">24 TB DUPLICATES 👯</text>
    </g>

    <!-- INTERNAL WASTE: Ghost Versions -->
    <g transform="translate(30, 130)">
      <rect width="140" height="30" rx="6" fill="#FFEDD5" stroke="#F59E0B" stroke-width="1.5" />
      <text x="10" y="20" fill="#B45309" font-family="sans-serif" font-weight="bold" font-size="10">15 TB GHOST DATA 👻</text>
    </g>

    <!-- INTERNAL WASTE: Abandoned Uploads -->
    <g transform="translate(50, 180)">
      <rect width="100" height="30" rx="6" fill="#DCFCE7" stroke="#10B981" stroke-width="1.5" />
      <text x="10" y="20" fill="#047857" font-family="sans-serif" font-weight="bold" font-size="10">5 TB UPLOADS 📦</text>
    </g>

    <text x="100" y="280" text-anchor="middle" fill="#1E3A8A" font-family="sans-serif" font-weight="900" font-size="18">Cost breakdown</text>
    <text x="100" y="305" text-anchor="middle" fill="#2563EB" font-family="sans-serif" font-weight="bold" font-size="14">44% RECOVERABLE</text>
  </g>

  <!-- Arrow Marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1" />
    </marker>
  </defs>
</svg>
