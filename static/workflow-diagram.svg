<svg width="600" height="300" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for Gradients and Shadows -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Source: Chubby S3 Bucket -->
  <g filter="url(#shadow)">
    <path d="M80 120C80 108.954 102.386 100 130 100C157.614 100 180 108.954 180 120V200C180 211.046 157.614 220 130 220C102.386 220 80 211.046 80 200V120Z" fill="#E2E8F0" stroke="#94A3B8" stroke-width="2"/>
    <ellipse cx="130" cy="120" rx="50" ry="20" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
    <text x="130" y="170" text-anchor="middle" fill="#64748B" font-family="sans-serif" font-weight="bold" font-size="12">SOURCE</text>
  </g>

  <!-- Arrow to Lambda -->
  <path d="M190 160H260" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arrowhead)"/>
  
  <!-- Processor: Lambda -->
  <g filter="url(#shadow)">
    <path d="M280 140L340 160L280 180V140Z" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
    <text x="310" y="210" text-anchor="middle" fill="#B45309" font-family="sans-serif" font-weight="bold" font-size="12">s3lim (Lambda)</text>
  </g>

  <!-- Arrow to Output -->
  <path d="M360 160H430" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="8 4"/>

  <!-- Output: Sliced Bucket -->
  <g filter="url(#shadow)">
    <!-- Bottom Slice -->
    <path d="M450 180C450 174 472 170 500 170C528 170 550 174 550 180V210C550 216 528 220 500 220C472 220 450 216 450 210V180Z" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <!-- Middle Slice -->
    <path d="M450 140C450 134 472 130 500 130C528 130 550 134 550 140V160C550 166 528 170 500 170C472 170 450 166 450 160V140Z" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2"/>
    <!-- Top Slice -->
    <path d="M450 100C450 94 472 90 500 90C528 90 550 94 550 100V120C550 126 528 130 500 130C472 130 450 126 450 120V100Z" fill="#93C5FD" stroke="#2563EB" stroke-width="2"/>
    
    <text x="500" y="240" text-anchor="middle" fill="#1D4ED8" font-family="sans-serif" font-weight="bold" font-size="12">PREFIX ANALYSIS</text>
    <text x="560" y="115" fill="#3B82F6" font-family="sans-serif" font-size="10">/logs</text>
    <text x="560" y="155" fill="#3B82F6" font-family="sans-serif" font-size="10">/data</text>
    <text x="560" y="195" fill="#3B82F6" font-family="sans-serif" font-size="10">/temp</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1" />
    </marker>
  </defs>
</svg>
