{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "s3lim",
  "operatingSystem": "AWS Lambda, Linux, macOS, Windows",
  "applicationCategory": "DevOpsApplication, StorageOptimization",
  "description": "High-performance S3 inventory analysis for cost optimization and observability.",
  "offers": {
    "@type": "Offer",
    "price": "0.20",
    "priceCurrency": "USD",
    "description": "per million objects analyzed"
  },
  "requirements": "Amazon S3 Inventory"
}
</script>
{{ end }}

{{ if isset .Params "faq_items" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $index, $element := .Params.faq_items }}
    {{ if $index }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ .question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ .answer }}"
      }
    }
    {{ end }}
  ]
}
</script>
{{ end }}

{{ if isset .Params "howto_steps" }}
...
</script>
{{ end }}

{{/* BreadcrumbList Schema */}}
{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    }
    {{ $position := 1 }}
    {{ range .Ancestors.Reverse }}
      {{ if not .IsHome }}
        {{ $position = add $position 1 }}
        ,{
          "@type": "ListItem",
          "position": {{ $position }},
          "name": "{{ .Title }}",
          "item": "{{ .Permalink }}"
        }
      {{ end }}
    {{ end }}
    {{ $position = add $position 1 }}
    ,{
      "@type": "ListItem",
      "position": {{ $position }},
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ end }}

{{ if isset .Params "tech_metadata" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "dependencies": "{{ .Params.tech_metadata.dependencies }}",
  "proficiencyLevel": "{{ .Params.tech_metadata.proficiency }}",
  "articleBody": "{{ .Plain | truncate 200 }}",
  "publisher": {
    "@type": "Organization",
    "name": "s3lim",
    "url": "{{ .Site.BaseURL }}"
  }
}
</script>
{{ end }}

{{ if isset .Params "glossary" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "DefinedTermSet",
  "name": "S3 Optimization Glossary",
  "hasDefinedTerm": [
    {{ range $index, $element := .Params.glossary }}
    {{ if $index }},{{ end }}
    {
      "@type": "DefinedTerm",
      "name": "{{ .term }}",
      "description": "{{ .definition }}"
    }
    {{ end }}
  ]
}
</script>
{{ end }}
