<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
    <header>
        <nav class="container">
            <a href="{{ .Site.BaseURL }}" class="logo">{{ .Site.Title }}</a>
            <ul class="nav-links">
                <li><a href="{{ "getting-started/autopilot/" | relURL }}">Getting Started</a></li>
                <li><a href="{{ "cli/s3lim/" | relURL }}">CLI</a></li>
                <li><a href="{{ "deployment/autopilot/" | relURL }}">Deployment</a></li>
                <li><a href="{{ "metrics/overview/" | relURL }}">Metrics</a></li>
                <li><a href="{{ .Site.Params.github_repo }}" target="_blank">GitHub</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. Licensed under BUSL 1.1.</p>
        </div>
    </footer>
</body>
</html>
