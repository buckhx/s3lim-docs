<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
    {{ partial "schema.html" . }}
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <style type="text/tailwindcss">
        @layer base {
            html { scroll-behavior: smooth; }
            body { @apply text-slate-700 bg-white antialiased overflow-x-hidden; }
            h1, h2, h3, h4, h5, h6 { @apply text-slate-900 font-bold tracking-tight scroll-mt-24; }
        }
        @layer components {
            .container { @apply max-w-6xl mx-auto px-6; }
            .nav-link { @apply text-slate-600 font-medium hover:text-blue-600 transition-colors; }
            .btn-primary { @apply inline-block bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 active:scale-95; }
            .terminal { @apply bg-slate-900 text-slate-300 p-6 rounded-xl font-mono text-sm overflow-x-auto shadow-2xl border border-slate-800 ring-1 ring-white/10; }
            .sidebar-link { @apply block py-1.5 text-sm text-slate-500 hover:text-blue-600 transition-colors; }
            .sidebar-link.active { @apply text-blue-600 font-semibold; }
            
            /* Typography Overrides for Atlantis-look */
            .prose h1 { @apply text-4xl mb-8 border-b border-slate-100 pb-4; }
            .prose h2 { @apply text-2xl mt-12 mb-4; }
            .prose h3 { @apply text-xl mt-8 mb-4; }
            .prose p { @apply leading-relaxed mb-6; }
            .prose code { @apply bg-slate-100 text-slate-900 px-1.5 py-0.5 rounded text-[0.9em] font-medium; }
            .prose pre { @apply bg-slate-900 text-slate-300 p-6 rounded-xl my-8 border border-slate-800; }
            .prose pre code { @apply bg-transparent text-inherit p-0 rounded-none font-normal; }
            .prose ul { @apply list-disc ml-6 mb-6 space-y-2; }
            .prose table { @apply block w-full overflow-x-auto text-sm border-collapse mb-8; }
            .prose th { @apply text-left border-b-2 border-slate-100 py-3 px-4 font-bold text-slate-900 whitespace-nowrap; }
            .prose td { @apply border-b border-slate-50 py-3 px-4; }

            /* Mobile Menu Hack */
            #menu-toggle:checked ~ nav ul { @apply flex flex-col absolute top-full left-0 right-0 bg-white border-b border-slate-100 p-6 gap-6 shadow-xl; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="border-b border-slate-100 py-6 sticky top-0 bg-white/90 backdrop-blur-md z-50">
        <input type="checkbox" id="menu-toggle" class="hidden">
        <nav class="container flex justify-between items-center relative">
            <a href="{{ .Site.BaseURL }}" class="flex items-center gap-3 no-underline group">
                <img src="{{ "favicon.svg" | relURL }}" class="w-8 h-8 group-hover:rotate-12 transition-transform" alt="Logo">
                <span class="text-xl font-extrabold tracking-tight text-slate-900 uppercase">s3lim</span>
            </a>
            
            <label for="menu-toggle" class="md:hidden cursor-pointer p-2 -mr-2 text-slate-600 hover:text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </label>

            <ul class="hidden md:flex gap-10 list-none m-0 p-0">
                <li><a href="{{ "about/" | relURL }}" class="nav-link text-sm uppercase tracking-wider">About</a></li>
                <li><a href="{{ "docs/getting-started/" | relURL }}" class="nav-link text-sm uppercase tracking-wider">Docs</a></li>
                <li><a href="{{ .Site.Params.github_repo }}" target="_blank" class="nav-link text-sm uppercase tracking-wider flex items-center gap-2">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 4.438 9.8 10.564 11.307.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C19.563 21.798 24 17.298 24 12c0-6.627-5.374-12-12-12z"/></svg>
                    GitHub
                </a></li>
            </ul>
        </nav>
    </header>

    <main class="flex-grow">
        {{ block "main" . }}{{ end }}
    </main>

    <footer class="border-t border-slate-100 py-16 text-slate-400 text-sm">
        <div class="container flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-3">
                <img src="{{ "favicon.svg" | relURL }}" class="w-6 h-6 grayscale opacity-50" alt="Logo">
                <span class="font-bold text-slate-300 uppercase tracking-widest">s3lim</span>
            </div>
            <p>&copy; {{ now.Format "2006" }} Slim Storage Solutions LLC. Licensed under BUSL 1.1.</p>
        </div>
    </footer>
</body>
</html>
