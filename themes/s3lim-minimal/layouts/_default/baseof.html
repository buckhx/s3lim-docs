<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply text-slate-700 bg-white; }
            h1, h2, h3 { @apply text-slate-900 font-bold; }
            a { @apply text-blue-600 hover:text-blue-700 transition-colors; }
        }
        @layer components {
            .container { @apply max-w-5xl mx-auto px-6; }
            .nav-link { @apply text-slate-600 font-medium hover:text-blue-600; }
            .btn-primary { @apply inline-block bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200; }
            .terminal { @apply bg-slate-900 text-slate-300 p-6 rounded-xl font-mono text-sm overflow-x-auto shadow-2xl border border-slate-800; }
            .sidebar-link { @apply block py-2 text-slate-500 hover:text-blue-600; }
            .sidebar-link.active { @apply text-blue-600 font-semibold; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="border-b border-slate-100 py-6 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <nav class="container flex justify-between items-center">
            <a href="{{ .Site.BaseURL }}" class="flex items-center gap-3 no-underline">
                <img src="{{ "favicon.svg" | relURL }}" class="w-8 h-8" alt="Logo">
                <span class="text-xl font-extrabold tracking-tight text-slate-900">{{ .Site.Title }}</span>
            </a>
            <ul class="hidden md:flex gap-8 list-none m-0 p-0">
                <li><a href="{{ "getting-started/autopilot/" | relURL }}" class="nav-link">Getting Started</a></li>
                <li><a href="{{ "cli/s3lim/" | relURL }}" class="nav-link">CLI</a></li>
                <li><a href="{{ "deployment/autopilot/" | relURL }}" class="nav-link">Deployment</a></li>
                <li><a href="{{ "metrics/overview/" | relURL }}" class="nav-link">Metrics</a></li>
                <li><a href="{{ .Site.Params.github_repo }}" target="_blank" class="nav-link flex items-center gap-1">GitHub</a></li>
            </ul>
        </nav>
    </header>

    <main class="flex-grow py-12">
        {{ block "main" . }}{{ end }}
    </main>

    <footer class="border-t border-slate-100 py-12 text-slate-400 text-sm">
        <div class="container text-center">
            <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. High-performance S3 analysis. Licensed under BUSL 1.1.</p>
        </div>
    </footer>
</body>
</html>
