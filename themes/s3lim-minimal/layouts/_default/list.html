{{ define "main" }}
<div class="container">
    <div class="flex flex-col md:flex-row gap-16 py-8">
        <aside class="w-full md:w-64 flex-shrink-0">
            <nav class="sticky top-32 space-y-8">
                <div class="space-y-3">
                    <h4 class="text-xs font-bold uppercase tracking-widest text-slate-400">Getting Started</h4>
                    <ul class="list-none p-0 m-0 space-y-1">
                        <li><a href="{{ "getting-started/autopilot/" | relURL }}" class="sidebar-link">Autopilot</a></li>
                        <li><a href="{{ "getting-started/enterprise/" | relURL }}" class="sidebar-link">Enterprise</a></li>
                    </ul>
                </div>
                <div class="space-y-3">
                    <h4 class="text-xs font-bold uppercase tracking-widest text-slate-400">Technical Reference</h4>
                    <ul class="list-none p-0 m-0 space-y-1">
                        <li><a href="{{ "cli/s3lim/" | relURL }}" class="sidebar-link">CLI Command</a></li>
                        <li><a href="{{ "deployment/autopilot/" | relURL }}" class="sidebar-link">SAM Template</a></li>
                        <li><a href="{{ "metrics/overview/" | relURL }}" class="sidebar-link">Metrics</a></li>
                    </ul>
                </div>
            </nav>
        </aside>
        <article class="prose prose-slate max-w-none flex-grow">
            {{ .Content }}
            <div class="mt-12 grid grid-cols-1 sm:grid-cols-2 gap-4">
                {{ range .Pages }}
                <a href="{{ .RelPermalink }}" class="block p-6 rounded-xl border border-slate-100 hover:border-blue-200 bg-slate-50/50 no-underline group">
                    <h3 class="m-0 text-lg group-hover:text-blue-600 transition-colors">{{ .Title }}</h3>
                    <p class="m-0 mt-2 text-sm text-slate-500">{{ .Description | default .Summary }}</p>
                </a>
                {{ end }}
            </div>
        </article>
    </div>
</div>
{{ end }}
