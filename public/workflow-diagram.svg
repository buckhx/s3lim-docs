<svg width="600" height="320" viewBox="0 0 600 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft Background Glow -->
  <circle cx="300" cy="160" r="150" fill="url(#glow)" opacity="0.4"/>
  
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 160) rotate(90) scale(150)">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Filter for "Hand-drawn" organic feel -->
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
    </filter>
  </defs>

  <!-- Connection Line: Source to Lambda -->
  <path d="M180 160 Q 230 160 280 160" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round" filter="url(#rough)"/>
  
  <!-- Connection Line: Lambda to Output -->
  <path d="M340 160 Q 390 160 440 160" stroke="#3B82F6" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round" filter="url(#rough)"/>

  <!-- SOURCE: Chubby S3 Bucket -->
  <g transform="translate(60, 100)" filter="url(#rough)">
    <!-- Bucket Body -->
    <path d="M20 40 C 20 10, 100 10, 100 40 L 110 110 C 110 135, 10 135, 10 110 Z" fill="#F1F5F9" stroke="#64748B" stroke-width="3"/>
    <!-- Bucket Top -->
    <ellipse cx="60" cy="40" rx="40" ry="15" fill="#F8FAFC" stroke="#64748B" stroke-width="3"/>
    <!-- "Storage" inside -->
    <path d="M35 80 H 85 M40 95 H 80 M45 110 H 75" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
    <text x="60" y="155" text-anchor="middle" fill="#64748B" font-family="ui-sans-serif, system-ui" font-weight="800" font-size="14">S3 SOURCE</text>
  </g>

  <!-- PROCESSOR: Lambda Spark -->
  <g transform="translate(285, 130)" filter="url(#rough)">
    <!-- Lambda Icon Stylized -->
    <path d="M15 0 L45 30 L15 60 L0 50 L20 30 L0 10 Z" fill="#F59E0B" stroke="#B45309" stroke-width="2.5"/>
    <text x="25" y="85" text-anchor="middle" fill="#B45309" font-family="ui-sans-serif, system-ui" font-weight="800" font-size="14">ANALYSIS</text>
  </g>

  <!-- OUTPUT: Sliced Analysis -->
  <g transform="translate(450, 80)" filter="url(#rough)">
    <!-- Top Slice (logs) -->
    <path d="M5 20 C 5 5, 95 5, 95 20 L 95 35 C 95 50, 5 50, 5 35 Z" fill="#93C5FD" stroke="#2563EB" stroke-width="2.5"/>
    <!-- Middle Slice (data) -->
    <path d="M5 55 C 5 40, 95 40, 95 55 L 95 70 C 95 85, 5 85, 5 70 Z" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2.5"/>
    <!-- Bottom Slice (temp) -->
    <path d="M5 90 C 5 75, 95 75, 95 90 L 95 105 C 95 120, 5 120, 5 105 Z" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5"/>
    
    <!-- Floating Labels -->
    <text x="105" y="32" fill="#2563EB" font-family="monospace" font-weight="600" font-size="12">/logs</text>
    <text x="105" y="67" fill="#2563EB" font-family="monospace" font-weight="600" font-size="12">/data</text>
    <text x="105" y="102" fill="#2563EB" font-family="monospace" font-weight="600" font-size="12">/temp</text>
    
    <text x="50" y="155" text-anchor="middle" fill="#1D4ED8" font-family="ui-sans-serif, system-ui" font-weight="800" font-size="14">COST INSIGHTS</text>
  </g>
</svg>
