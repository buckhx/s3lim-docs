<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradients -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <filter id="dropshadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND: Minimalist Grid or Connectors -->
  <path d="M150 200 H 650" stroke="#F1F5F9" stroke-width="2" stroke-dasharray="10 10" />

  <!-- SOURCE: The 100TB Bucket -->
  <g filter="url(#dropshadow)" transform="translate(100, 140)">
    <path d="M10 30 C 10 10, 90 10, 90 30 L 95 100 C 95 120, 5 120, 5 100 Z" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <ellipse cx="50" cy="30" rx="40" ry="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <text x="50" y="75" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-weight="800" font-size="10">SOURCE</text>
    <text x="50" y="95" text-anchor="middle" fill="#1E293B" font-family="sans-serif" font-weight="900" font-size="16">100 TB</text>
  </g>

  <!-- THE ANALYZER: s3lim Lambda (Central Hub) -->
  <g filter="url(#dropshadow)" transform="translate(340, 130)">
    <!-- Hexagonal Hub -->
    <path d="M60 0 L112 30 L112 90 L60 120 L8 90 L8 30 Z" fill="url(#blueGradient)" />
    <path d="M60 10 L102 35 L102 85 L60 110 L18 85 L18 35 Z" fill="white" fill-opacity="0.1" />
    <path d="M35 30 L85 60 L35 90 L55 60 Z" fill="white" /> <!-- Lambda Symbol -->
    <text x="60" y="145" text-anchor="middle" fill="#2563EB" font-family="sans-serif" font-weight="800" font-size="12">s3lim ENGINE</text>
    <text x="60" y="160" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="10" font-weight="bold">In-Account Analysis</text>
  </g>

  <!-- OUTPUT: Component Breakdown -->
  <g transform="translate(580, 80)">
    <!-- Item 1: Duplicates -->
    <g filter="url(#dropshadow)" transform="translate(0, 0)">
      <rect width="140" height="60" rx="12" fill="white" stroke="#F1F5F9" stroke-width="2"/>
      <rect x="10" y="15" width="30" height="30" rx="6" fill="#FEE2E2"/>
      <text x="18" y="36" fill="#EF4444" font-size="14">👯</text>
      <text x="50" y="30" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="12">Duplicates</text>
      <text x="50" y="45" fill="#94A3B8" font-family="sans-serif" font-size="10">24 TB Waste</text>
    </g>

    <!-- Item 2: Hotspots -->
    <g filter="url(#dropshadow)" transform="translate(20, 90)">
      <rect width="140" height="60" rx="12" fill="white" stroke="#F1F5F9" stroke-width="2"/>
      <rect x="10" y="15" width="30" height="30" rx="6" fill="#FFEDD5"/>
      <text x="18" y="36" fill="#F59E0B" font-size="14">🔥</text>
      <text x="50" y="30" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="12">Hotspots</text>
      <text x="50" y="45" fill="#94A3B8" font-family="sans-serif" font-size="10">/data/logs</text>
    </g>

    <!-- Item 3: Ghost Versions -->
    <g filter="url(#dropshadow)" transform="translate(0, 180)">
      <rect width="140" height="60" rx="12" fill="white" stroke="#F1F5F9" stroke-width="2"/>
      <rect x="10" y="15" width="30" height="30" rx="6" fill="#DBEAFE"/>
      <text x="18" y="36" fill="#3B82F6" font-size="14">👻</text>
      <text x="50" y="30" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="12">Ghost Data</text>
      <text x="50" y="45" fill="#94A3B8" font-family="sans-serif" font-size="10">Old Versions</text>
    </g>
  </g>

  <!-- Connectors -->
  <path d="M200 190 C 250 190, 290 190, 340 190" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M460 170 C 500 170, 520 110, 580 110" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.3" marker-end="url(#arrowhead)"/>
  <path d="M460 190 C 500 190, 540 190, 580 190" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.3" marker-end="url(#arrowhead)"/>
  <path d="M460 210 C 500 210, 520 270, 580 270" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.3" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1" />
    </marker>
  </defs>
</svg>
